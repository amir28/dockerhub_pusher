# name: "Mirror ${{ github.event.inputs.image }} to ${{ github.event.inputs.registry }}"
name: "Mirror image"

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          repository: amir28/gh-action-image-mirror
          ref: 'fix-multiplatform'
          path: scripts
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ssakm
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Do mirror
        run: |
          yq e '.[] | [.name, .source, .dest] | join("|")' "./mirrorlist/container_images.yaml" | while IFS='|' read -r name source dest; do
            echo "Processing item..."
            echo "Name:   $name"
            echo "Source: $source"
            echo "Dest:   $dest"
            echo "--------------------------"
            scripts/mirror.sh \
            -r "$dest" \
            -v \
            -- \
              "$source"
          done
